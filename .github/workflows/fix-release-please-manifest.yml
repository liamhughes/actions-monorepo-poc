on:
  pull_request:
    branches:
      - main
name: Fix Release Please manifest
jobs:
  fix-manifest:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Reconcile manifest with main
        run: |
          COMPONENT="packages/$(echo "${{ github.head_ref }}" | sed 's/.*--components--//')"
          PR_VERSION=$(jq -r --arg c "$COMPONENT" '.[$c]' .release-please-manifest.json)

          git fetch origin main
          git show origin/main:.release-please-manifest.json \
            | jq --arg c "$COMPONENT" --arg v "$PR_VERSION" '.[$c] = $v' \
            > /tmp/manifest.json

          if ! diff -q .release-please-manifest.json /tmp/manifest.json > /dev/null 2>&1; then
            cp /tmp/manifest.json .release-please-manifest.json
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .release-please-manifest.json
            git commit -m "chore: reconcile release-please manifest [skip ci]"
            git push origin
          fi
