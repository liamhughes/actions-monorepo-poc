on:
  push:
    branches:
      - release-please--**
name: Build dist
jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Build
        run: |
          COMPONENT=$(echo "$GITHUB_REF_NAME" | sed 's/.*--components--//')
          npm run build --workspace=packages/$COMPONENT

      - name: Commit dist
        run: |
          COMPONENT=$(echo "$GITHUB_REF_NAME" | sed 's/.*--components--//')
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/$COMPONENT/dist
          git diff-index --quiet HEAD || git commit -m "chore: build dist [skip ci]" && git push origin
